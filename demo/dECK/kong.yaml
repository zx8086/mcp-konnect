_format_version: "3.0"
_konnect:
  control_plane_name: Foundation
consumers:
- keyauth_credentials:
  - key: demo_key
  username: demo_user
plugins:
- config:
    anonymous: null
    hide_credentials: false
    identity_realms:
    - id: null
      region: null
      scope: cp
    key_in_body: false
    key_in_header: true
    key_in_query: true
    key_names:
    - apikey
    realm: null
    run_on_preflight: true
  enabled: false
  name: key-auth
  protocols:
  - grpc
  - grpcs
  - http
  - https
  - ws
  - wss
- config:
    day: null
    error_code: 429
    error_message: API rate limit exceeded
    fault_tolerant: true
    header_name: null
    hide_client_headers: false
    hour: null
    limit_by: consumer
    minute: 10
    month: null
    path: null
    policy: local
    redis:
      database: 0
      host: null
      password: null
      port: 6379
      server_name: null
      ssl: false
      ssl_verify: false
      timeout: 2000
      username: null
    redis_database: 0
    redis_host: null
    redis_password: null
    redis_port: 6379
    redis_server_name: null
    redis_ssl: false
    redis_ssl_verify: false
    redis_timeout: 2000
    redis_username: null
    second: null
    sync_rate: -1
    year: null
  enabled: true
  name: rate-limiting
  protocols:
  - grpc
  - grpcs
  - http
  - https
  route: Simple-API-Route
  service: Simple-API-Service
services:
- connect_timeout: 60000
  enabled: true
  host: 192.168.178.10
  name: Simple-API-Service
  path: /
  port: 3000
  protocol: http
  read_timeout: 60000
  retries: 5
  routes:
  - https_redirect_status_code: 426
    methods:
    - GET
    - PUT
    - POST
    - PATCH
    - DELETE
    name: Simple-API-Route
    path_handling: v0
    paths:
    - /
    preserve_host: false
    protocols:
    - http
    - https
    regex_priority: 0
    request_buffering: true
    response_buffering: true
    strip_path: true
  write_timeout: 60000
