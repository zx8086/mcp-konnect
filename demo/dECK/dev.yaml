      openapi: 3.0.2
      info:
        title: Test subscriber
        description: Test subscriber
        version: '0.1'
      host: gateway.dev.shared-services.eu.pvh.cloud
      basePath: /
      schemes:
        - http
        - https
      consumes:
        - application/json
      produces:
        - application/json
      paths:
        /test/notifications:
          get:
            summary: Send notifications
            requestBody:
              description: 'notification body'
              required: true
            responses:
              '200':
                description: Notification received by consumer
                content:
                  application/json:
                    schema:
                      type: object
                      properties:
                        response:
                          type: string
                      required:
                        - response
                    examples:
                        body:
                          summary: Notification example
                          value:
                            response: ok
