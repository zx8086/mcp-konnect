_format_version: "3.0"
_konnect:
  control_plane_name: Foundation
consumers:
  - username: demo_user
plugins:
  - config:
      echo_downstream: false
      generator: uuid#counter
      header_name: Kong-Request-ID
    enabled: true
    name: correlation-id
    protocols:
      - grpc
      - grpcs
      - http
      - https
  - config:
      anonymous: null
      hide_credentials: false
      identity_realms:
        - id: null
          region: null
          scope: cp
      key_in_body: false
      key_in_header: true
      key_in_query: true
      key_names:
        - apikey
      realm: null
      run_on_preflight: true
    enabled: false
    name: key-auth
    protocols:
      - grpc
      - grpcs
      - http
      - https
  - config:
      day: null
      error_code: 429
      error_message: API rate limit exceeded
      fault_tolerant: true
      header_name: null
      hide_client_headers: false
      hour: null
      limit_by: consumer
      minute: 10
      month: null
      path: null
      policy: local
      redis:
        database: 0
        host: null
        password: null
        port: 6379
        server_name: null
        ssl: false
        ssl_verify: false
        timeout: 2000
        username: null
      redis_database: 0
      redis_host: null
      redis_password: null
      redis_port: 6379
      redis_server_name: null
      redis_ssl: false
      redis_ssl_verify: false
      redis_timeout: 2000
      redis_username: null
      second: null
      sync_rate: -1
      year: null
    enabled: true
    name: rate-limiting
    protocols:
      - grpc
      - grpcs
      - http
      - https
    route: Simple-API-Route
    service: Simple-API-Service
services:
  - connect_timeout: 60000
    enabled: true
    host: 192.168.178.10
    name: Simple-API-Service
    path: /
    port: 3000
    protocol: http
    read_timeout: 60000
    retries: 5
    routes:
      - https_redirect_status_code: 426
        methods:
          - GET
          - PUT
          - POST
          - PATCH
          - DELETE
        name: Simple-API-Route
        path_handling: v0
        paths:
          - /
        plugins:
          - config:
              add:
                headers:
                  - X-Service-Runtime:bun
                if_status: []
                json: []
                json_types: []
              allow:
                json: null
              append:
                headers: []
                if_status: []
                json: []
                json_types: []
              dots_in_keys: true
              remove:
                headers: []
                if_status: []
                json: []
              rename:
                headers: []
                if_status: []
              replace:
                body: null
                headers: []
                if_status: []
                json: []
                json_types: []
              transform:
                functions: []
                if_status: []
                json: []
            enabled: true
            name: response-transformer-advanced
            protocols:
              - grpc
              - grpcs
              - http
              - https
        preserve_host: false
        protocols:
          - http
          - https
        regex_priority: 0
        request_buffering: true
        response_buffering: true
        strip_path: true
    write_timeout: 60000
  - name: customer-assignments
    connect_timeout: 60000
    enabled: true
    host: customer-assignments.dev.shared-services.eu.pvh.cloud
    path: /
    port: 443
    protocol: https
    read_timeout: 60000
    retries: 5
    routes:
      - hosts:
          - gateway.dev.shared-services.eu.pvh.cloud
        https_redirect_status_code: 426
        name: customer-assignments
        path_handling: v0
        paths:
          - /customer-assignments
        preserve_host: false
        protocols:
          - http
          - https
        regex_priority: 0
        request_buffering: true
        response_buffering: true
        strip_path: true
        tags:
          - shared-svc
    write_timeout: 60000
    plugins:
      - config:
          anonymous: 56456a01-65ec-4415-aec8-49fec6403c9c
          claims_to_verify:
            - exp
            - nbf
          cookie_names: []
          header_names:
            - authorization
          key_claim_name: key
          maximum_expiration: 0
          run_on_preflight: true
          secret_is_base64: false
          uri_param_names:
            - jwt
        enabled: true
        name: jwt
        protocols:
          - grpc
          - grpcs
          - http
          - https
  - name: authentication
    connect_timeout: 60000
    enabled: true
    host: authentication.dev.shared-services.eu.pvh.cloud
    path: /
    port: 443
    protocol: https
    read_timeout: 60000
    retries: 5
    routes:
      - hosts:
          - gateway.dev.shared-services.eu.pvh.cloud
        https_redirect_status_code: 426
        name: authentication
        path_handling: v1
        paths:
          - /tokens
        plugins:
          - config:
              hide_credentials: true
              key_in_body: false
              key_in_header: true
              key_in_query: true
              key_names:
                - apikey
              run_on_preflight: true
            enabled: true
            name: key-auth
            protocols:
              - grpc
              - grpcs
              - http
              - https
        preserve_host: false
        protocols:
          - http
          - https
        regex_priority: 0
        request_buffering: true
        response_buffering: true
        strip_path: false
    write_timeout: 60000
